name: Python lint

on:
  push:
    branches: [main]

jobs:
  validates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v4

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run linter
        run:  flake8 app.py